  <circle cx="220" cy="260" r="24" fill="#2ED573"/>
  <circle cx="280" cy="280" r="24" fill="#1E90FF"/>
  <circle cx="190" cy="330" r="24" fill="#FFA502"/>
  <circle cx="260" cy="340" r="24" fill="#A855F7"/>
  <!-- 小朋友手 -->
  <g transform="translate(330, 340)">
    <ellipse cx="0" cy="0" rx="55" ry="65" fill="#FFDAB9"/>
    <ellipse cx="-25" cy="-50" rx="12" ry="20" fill="#FFDAB9"/>
    <ellipse cx="25" cy="-50" rx="12" ry="20" fill="#FFDAB9"/>
